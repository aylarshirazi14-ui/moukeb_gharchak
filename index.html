<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سامانه اطلاع رسانی مواکب پیاده روی جاماندگان اربعین ۱۴۰۵</title>

<body>

<section class="hero">
<div class="overlay">
<h1>سامانه اطلاع رسانی مواکب پیاده روی جاماندگان اربعین ۱۴۰۵</h1>
<h2>مسجد جامع قرچک تا حرم حضرت شاه عبدالعظیم حسنی (ع)</h2>

</div>
</section>

<section class="cards">
<div class="card">
<h3 id="mokebCount">0</h3>
<span>موکب فعال</span>
</div>
<div class="card">
<h3>۱۸ KM</h3>
<span>طول مسیر</span>
</div>
</section>

<div class="searchBox">
<input id="search" placeholder="🔍 جستجوی نام موکب">
</div>

<div class="filters">
<button onclick="filterMokeb('all')">همه</button>
<button onclick="filterMokeb('پذیرایی')">🟢 پذیرایی</button>
<button onclick="filterMokeb('فرهنگی')">🔵 فرهنگی</button>
<button onclick="filterMokeb('خدماتی')">🟠 خدماتی</button>
<button onclick="filterMokeb('درمانی')">🔴 درمانی</button>
</div>

<div id="map"></div>

<footer>
کمیته اطلاع رسانی و رسانه پیاده روی جاماندگان اربعین شهرستان قرچک

</html>
